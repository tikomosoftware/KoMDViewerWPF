name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
    
    - name: Extract version from tag
      id: get_version
      shell: pwsh
      run: |
        $tag = "${{ github.ref_name }}"
        $version = $tag -replace '^v', ''
        echo "VERSION=$version" >> $env:GITHUB_OUTPUT
        echo "Version: $version"
    
    - name: Build Release Packages
      shell: pwsh
      run: |
        .\build-and-package.ps1 -Version "${{ steps.get_version.outputs.VERSION }}"
    
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/KoMDViewerWPF-v${{ steps.get_version.outputs.VERSION }}-release.zip
          dist/KoMDViewerWPF-v${{ steps.get_version.outputs.VERSION }}-vector.zip
        body: |
          ## KoMDViewer WPF v${{ steps.get_version.outputs.VERSION }}
          
          ### ダウンロード
          
          **通常版 (KoMDViewerWPF-v${{ steps.get_version.outputs.VERSION }}-release.zip):**
          - 一般的な配布用パッケージです。
          - ZIPに同梱の `install-runtime.bat` を初回のみ実行してください。
          - 必要環境: .NET 9 Desktop Runtime, Microsoft Edge WebView2 Runtime
          - [.NET 9.0 Runtimeをダウンロード](https://dotnet.microsoft.com/download/dotnet/9.0)
          - [WebView2 Runtimeをダウンロード](https://developer.microsoft.com/microsoft-edge/webview2/)
          
          **Vector用 (KoMDViewerWPF-v${{ steps.get_version.outputs.VERSION }}-vector.zip):**
          - Vector等のソフトウェア配布サイト向けのパッケージです（READMEがVector用になっています）。
          
          ### 変更内容
          
          リリースノートをここに記載してください。
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
